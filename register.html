<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="register.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="background"></div>

    <div class="register-container">

        <div class="register-left">

            <h1>Create Account</h1>

            <p>
                Register yourself and enter into the futuristic world.
            </p>

            <img src="https://png.pngtree.com/thumb_back/fh260/background/20240513/pngtree-free-background-images-stock-photos-to-download-pictures-image_15734467.jpg">

        </div>

        <div class="register-right">

            <h2>Register</h2>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter Email">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Enter Username">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="phone" placeholder="Enter Phone Number">
            </div>

            <button onclick="register()">Register</button>

            <p class="login-text">
                Already Registered?
                <a href="index.html">Login</a>
            </p>

        </div>

    </div>

    <script src="register.js"></script>

</body>
</html>
